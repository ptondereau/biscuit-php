name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip release creation)"
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          ini-values: memory_limit=-1
          extensions: mbstring
        env:
          phpts: ${{ matrix.phpts }}

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package PIE binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE=${{ matrix.phpts == 'ts' && 'zts' || 'nts' }}
          ARCHIVE_NAME="php_biscuit-${VERSION}_php${{ matrix.php-version }}-x86_64-linux-glibc-${TSMODE}.zip"
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/libbiscuit.so dist/biscuit.so
          cd dist
          zip "${ARCHIVE_NAME}" biscuit.so
          rm biscuit.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-linux-x86_64-glibc-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  build-linux-x86_64-musl:
    name: Build Linux x86_64 musl - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-latest
    container:
      image: php:${{ matrix.php-version }}-${{ matrix.phpts == 'ts' && 'zts' || 'cli' }}-alpine
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]
    env:
      RUSTFLAGS: "-C target-feature=-crt-static -C linker=gcc"

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            curl \
            bash \
            build-base \
            openssl-dev \
            pkgconfig \
            git \
            clang \
            clang-libs \
            clang-dev \
            llvm \
            llvm-dev \
            musl-dev \
            zip

      - name: Set LIBCLANG_PATH
        run: |
          echo "LIBCLANG_PATH=/usr/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build release binary
        run: |
          source $HOME/.cargo/env
          cargo build --release

      - name: Package PIE binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE=${{ matrix.phpts == 'ts' && 'zts' || 'nts' }}
          ARCHIVE_NAME="php_biscuit-${VERSION}_php${{ matrix.php-version }}-x86_64-linux-musl-${TSMODE}.zip"
          mkdir -p dist
          cp target/release/libbiscuit.so dist/biscuit.so
          cd dist
          zip "${ARCHIVE_NAME}" biscuit.so
          rm biscuit.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-linux-x86_64-musl-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  build-linux-arm64:
    name: Build Linux arm64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm64-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          ini-values: memory_limit=-1
          extensions: mbstring
        env:
          phpts: ${{ matrix.phpts }}

      - name: Build release binary
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package PIE binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE=${{ matrix.phpts == 'ts' && 'zts' || 'nts' }}
          ARCHIVE_NAME="php_biscuit-${VERSION}_php${{ matrix.php-version }}-arm64-linux-glibc-${TSMODE}.zip"
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/libbiscuit.so dist/biscuit.so
          cd dist
          zip "${ARCHIVE_NAME}" biscuit.so
          rm biscuit.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-linux-arm64-glibc-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  build-linux-arm64-musl:
    name: Build Linux arm64 musl - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - uses: actions/checkout@v6

      - name: Build in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e RUSTFLAGS="-C target-feature=-crt-static -C linker=gcc" \
            -e LIBCLANG_PATH=/usr/lib \
            php:${{ matrix.php-version }}-${{ matrix.phpts == 'ts' && 'zts' || 'cli' }}-alpine \
            sh -c '
              apk add --no-cache \
                curl bash build-base openssl-dev pkgconfig git \
                clang clang-libs clang-dev llvm llvm-dev musl-dev &&
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable &&
              source $HOME/.cargo/env &&
              cargo build --release
            '

      - name: Package PIE binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE=${{ matrix.phpts == 'ts' && 'zts' || 'nts' }}
          ARCHIVE_NAME="php_biscuit-${VERSION}_php${{ matrix.php-version }}-arm64-linux-musl-${TSMODE}.zip"
          mkdir -p dist
          cp target/release/libbiscuit.so dist/biscuit.so
          cd dist
          zip "${ARCHIVE_NAME}" biscuit.so
          rm biscuit.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-linux-arm64-musl-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  build-macos-x86_64:
    name: Build macOS x86_64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: macos-15-intel
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-x86_64-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          ini-values: memory_limit=-1
          extensions: mbstring
        env:
          phpts: ${{ matrix.phpts }}

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-apple-darwin

      - name: Package PIE binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE=${{ matrix.phpts == 'ts' && 'zts' || 'nts' }}
          ARCHIVE_NAME="php_biscuit-${VERSION}_php${{ matrix.php-version }}-x86_64-darwin-bsdlibc-${TSMODE}.zip"
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/libbiscuit.dylib dist/biscuit.so
          cd dist
          zip "${ARCHIVE_NAME}" biscuit.so
          rm biscuit.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-macos-x86_64-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  build-windows:
    name: Build Windows x86_64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: windows-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]
        include:
          - { php-version: "8.1", compiler: "vs16" }
          - { php-version: "8.2", compiler: "vs16" }
          - { php-version: "8.3", compiler: "vs16" }
          - { php-version: "8.4", compiler: "vs17" }
          - { php-version: "8.5", compiler: "vs17" }

    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x86_64-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          ini-values: memory_limit=-1
          extensions: mbstring
        env:
          phpts: ${{ matrix.phpts }}

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package PIE binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE="${{ matrix.phpts }}"
          BASE_NAME="php_biscuit-${VERSION}-${{ matrix.php-version }}-${TSMODE}-${{ matrix.compiler }}-x86_64"
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/biscuit.dll dist/${BASE_NAME}.dll
          cd dist
          7z a "${BASE_NAME}.zip" "${BASE_NAME}.dll"
          rm "${BASE_NAME}.dll"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-windows-x86_64-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  build-macos-arm64:
    name: Build macOS arm64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: macos-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-arm64-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          ini-values: memory_limit=-1
          extensions: mbstring
        env:
          phpts: ${{ matrix.phpts }}

      - name: Build release binary
        run: |
          cargo build --release --target aarch64-apple-darwin

      - name: Package PIE binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE=${{ matrix.phpts == 'ts' && 'zts' || 'nts' }}
          ARCHIVE_NAME="php_biscuit-${VERSION}_php${{ matrix.php-version }}-arm64-darwin-bsdlibc-${TSMODE}.zip"
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/libbiscuit.dylib dist/biscuit.so
          cd dist
          zip "${ARCHIVE_NAME}" biscuit.so
          rm biscuit.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pie-macos-arm64-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist/*.zip

  verify-linux-x86_64:
    name: Verify Linux x86_64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-latest
    needs: build-linux-x86_64
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.phpts }}

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-linux-x86_64-glibc-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary
        run: |
          cd dist
          unzip *.zip
          php -dextension=./biscuit.so -m | grep biscuit

  verify-linux-x86_64-musl:
    name: Verify Linux x86_64 musl - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-latest
    container:
      image: php:${{ matrix.php-version }}-${{ matrix.phpts == 'ts' && 'zts' || 'cli' }}-alpine
    needs: build-linux-x86_64-musl
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - name: Install unzip
        run: apk add --no-cache unzip

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-linux-x86_64-musl-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary
        run: |
          cd dist
          unzip *.zip
          php -dextension=./biscuit.so -m | grep biscuit

  verify-linux-arm64:
    name: Verify Linux arm64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-24.04-arm
    needs: build-linux-arm64
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.phpts }}

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-linux-arm64-glibc-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary
        run: |
          cd dist
          unzip *.zip
          php -dextension=./biscuit.so -m | grep biscuit

  verify-linux-arm64-musl:
    name: Verify Linux arm64 musl - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: ubuntu-24.04-arm
    needs: build-linux-arm64-musl
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-linux-arm64-musl-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/dist" \
            -w /dist \
            php:${{ matrix.php-version }}-${{ matrix.phpts == 'ts' && 'zts' || 'cli' }}-alpine \
            sh -c '
              apk add --no-cache unzip &&
              unzip *.zip &&
              php -dextension=./biscuit.so -m | grep biscuit
            '

  verify-macos-x86_64:
    name: Verify macOS x86_64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: macos-15-intel
    needs: build-macos-x86_64
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.phpts }}

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-macos-x86_64-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary
        run: |
          cd dist
          unzip *.zip
          php -dextension=./biscuit.so -m | grep biscuit

  verify-macos-arm64:
    name: Verify macOS arm64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: macos-latest
    needs: build-macos-arm64
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]

    steps:
      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.phpts }}

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-macos-arm64-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary
        run: |
          cd dist
          unzip *.zip
          php -dextension=./biscuit.so -m | grep biscuit

  verify-windows:
    name: Verify Windows x86_64 - PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
    runs-on: windows-latest
    needs: build-windows
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpts: ["ts", "nts"]
        include:
          - { php-version: "8.1", compiler: "vs16" }
          - { php-version: "8.2", compiler: "vs16" }
          - { php-version: "8.3", compiler: "vs16" }
          - { php-version: "8.4", compiler: "vs17" }
          - { php-version: "8.5", compiler: "vs17" }

    steps:
      - name: Install PHP ${{ matrix.php-version }} (${{ matrix.phpts }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.phpts }}

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pie-windows-x86_64-php${{ matrix.php-version }}-${{ matrix.phpts }}
          path: dist

      - name: Verify binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TSMODE="${{ matrix.phpts }}"
          DLL_NAME="php_biscuit-${VERSION}-${{ matrix.php-version }}-${TSMODE}-${{ matrix.compiler }}-x86_64.dll"
          cd dist
          7z x *.zip
          php -dextension=./${DLL_NAME} -m | grep biscuit

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify-linux-x86_64
      - verify-linux-x86_64-musl
      - verify-linux-arm64
      - verify-linux-arm64-musl
      - verify-macos-x86_64
      - verify-macos-arm64
      - verify-windows

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name "*.zip" -exec cp {} release/ \;

      - name: Create Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run completed successfully!"
          echo "Artifacts that would be released:"
          ls -la release/
